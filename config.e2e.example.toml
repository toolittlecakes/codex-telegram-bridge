# Telegram bot settings for isolated local e2e runs.
[telegram]
bot_token = "123456:replace-me"
# Required for repeatable smoke runs. Use the private chat id of the dedicated test account.
primary_chat_id = 123456789
# Keep the allow-list explicit so the bridge does not auto-bind another chat during tests.
allowed_chat_ids = [123456789]
processing_reaction = "👀"
done_reaction = "👌"
delete_approval_messages = true

[desktop]
app_path = "/Applications/Codex.app"
# Use a dedicated Codex Desktop profile for e2e runs.
user_data_dir = "./.e2e/codex-profile"
remote_debugging_port = 9239
launch_timeout_seconds = 30
poll_interval_seconds = 0.5

[bridge]
state_path = "./.e2e/state/e2e-state.json"
allow_first_private_chat = false
max_message_chars = 3900
log_level = "DEBUG"
protocol_log_level = "DEBUG"
log_path = "./.e2e/state/logs/bridge.log"
protocol_log_path = "./.e2e/state/logs/protocol.log"
console_log = true
log_max_bytes = 10485760
log_backup_count = 7
