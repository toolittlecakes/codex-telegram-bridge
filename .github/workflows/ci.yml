name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install project
        run: uv pip install -e .[dev]
      - name: Run tests
        run: PYTHONPATH=src pytest
